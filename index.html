<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlackRoad Agent Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
    padding: 24px;
    min-height: 100vh;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 1px solid #222;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 600;
    color: #ffffff;
    letter-spacing: 1px;
  }
  .header .status-bar {
    display: flex;
    gap: 12px;
    align-items: center;
    font-size: 13px;
    color: #888;
  }
  .live-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #4caf50;
    display: inline-block;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .card {
    background: #141414;
    border: 1px solid #222;
    border-radius: 8px;
    padding: 20px;
    transition: border-color 0.2s;
  }
  .card:hover {
    border-color: #444;
  }
  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .card-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .card-name {
    font-size: 15px;
    font-weight: 600;
    color: #ffffff;
  }
  .card-role {
    font-size: 12px;
    color: #888;
    margin-top: 2px;
  }
  .card-status {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    margin-left: auto;
    font-weight: 500;
  }
  .status-online { background: rgba(76, 175, 80, 0.15); color: #4caf50; }
  .status-idle { background: rgba(245, 166, 35, 0.15); color: #f5a623; }
  .status-offline { background: rgba(244, 67, 54, 0.15); color: #f44336; }
  .card-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
  }
  .stat {
    background: #1a1a1a;
    border-radius: 4px;
    padding: 8px 10px;
  }
  .stat-label {
    font-size: 10px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .stat-value {
    font-size: 16px;
    font-weight: 600;
    color: #ccc;
    margin-top: 2px;
  }
  .card-group {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 12px;
  }
  .group-tag {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .group-core { background: rgba(41, 121, 255, 0.15); color: #2979ff; }
  .group-fleet { background: rgba(255, 29, 108, 0.15); color: #ff1d6c; }
  .group-specialist { background: rgba(156, 39, 176, 0.15); color: #9c27b0; }
  .summary {
    display: flex;
    gap: 24px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .summary-card {
    background: #141414;
    border: 1px solid #222;
    border-radius: 8px;
    padding: 16px 24px;
    min-width: 140px;
  }
  .summary-label {
    font-size: 11px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .summary-value {
    font-size: 28px;
    font-weight: 700;
    color: #ffffff;
    margin-top: 4px;
  }
  .footer {
    margin-top: 32px;
    padding-top: 16px;
    border-top: 1px solid #222;
    font-size: 12px;
    color: #444;
    text-align: center;
  }
  .error-banner {
    background: rgba(244, 67, 54, 0.1);
    border: 1px solid rgba(244, 67, 54, 0.3);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 24px;
    font-size: 13px;
    color: #f44336;
    display: none;
  }
</style>
</head>
<body>
  <div class="header">
    <h1>BLACKROAD AGENT DASHBOARD</h1>
    <div class="status-bar">
      <span class="live-dot"></span>
      <span id="last-updated">Loading...</span>
    </div>
  </div>

  <div id="error-banner" class="error-banner"></div>

  <div id="summary" class="summary"></div>
  <div id="grid" class="grid"></div>

  <div class="footer">
    BlackRoad OS -- Remember the Road. Pave Tomorrow. Incorporated 2025.
  </div>

<script>
const STATS_URL = 'https://stats-blackroad.blackroad.workers.dev/live';
const REFRESH_INTERVAL = 30000;

const AGENT_META = {
  road:    { color: '#FF1D6C', role: 'Fleet Commander', group: 'core' },
  coder:   { color: '#2979FF', role: 'Software Engineer', group: 'core' },
  scholar: { color: '#9C27B0', role: 'Researcher', group: 'core' },
  alice:   { color: '#F5A623', role: 'Gateway / Network', group: 'fleet' },
  cecilia: { color: '#FF1D6C', role: 'AI Inference', group: 'fleet' },
  octavia: { color: '#2979FF', role: 'DevOps / Git', group: 'fleet' },
  lucidia: { color: '#9C27B0', role: 'Web Hosting', group: 'fleet' },
  aria:    { color: '#F5A623', role: 'Monitoring', group: 'fleet' },
  pascal:  { color: '#FF1D6C', role: 'Mathematics', group: 'specialist' },
  writer:  { color: '#2979FF', role: 'Content Creation', group: 'specialist' },
  tutor:   { color: '#F5A623', role: 'Education', group: 'specialist' },
  cipher:  { color: '#9C27B0', role: 'Security', group: 'specialist' }
};

function timeAgo(dateStr) {
  if (!dateStr) return 'never';
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hours = Math.floor(mins / 60);
  if (hours < 24) return hours + 'h ago';
  return Math.floor(hours / 24) + 'd ago';
}

function getStatusClass(status) {
  if (status === 'online' || status === 'active') return 'status-online';
  if (status === 'idle' || status === 'standby') return 'status-idle';
  return 'status-offline';
}

function renderSummary(agents) {
  const online = agents.filter(a => a.status === 'online' || a.status === 'active').length;
  const totalMessages = agents.reduce((sum, a) => sum + (a.messages_sent || 0), 0);
  const container = document.getElementById('summary');
  container.innerHTML = `
    <div class="summary-card">
      <div class="summary-label">Agents Online</div>
      <div class="summary-value">${online}/${agents.length}</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Total Messages</div>
      <div class="summary-value">${totalMessages.toLocaleString()}</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Groups</div>
      <div class="summary-value">3</div>
    </div>
  `;
}

function renderAgents(agents) {
  const grid = document.getElementById('grid');
  grid.innerHTML = agents.map(agent => {
    const meta = AGENT_META[agent.id] || { color: '#666', role: 'Agent', group: 'unknown' };
    const statusClass = getStatusClass(agent.status || 'offline');
    const groupClass = 'group-' + meta.group;
    return `
      <div class="card">
        <div class="card-header">
          <div class="card-dot" style="background: ${meta.color}"></div>
          <div>
            <div class="card-name">${agent.name || agent.id}</div>
            <div class="card-role">${meta.role}</div>
          </div>
          <span class="card-status ${statusClass}">${agent.status || 'offline'}</span>
        </div>
        <div class="card-stats">
          <div class="stat">
            <div class="stat-label">Messages</div>
            <div class="stat-value">${(agent.messages_sent || 0).toLocaleString()}</div>
          </div>
          <div class="stat">
            <div class="stat-label">Last Active</div>
            <div class="stat-value">${timeAgo(agent.last_active)}</div>
          </div>
        </div>
        <div class="card-group">
          <span class="group-tag ${groupClass}">${meta.group}</span>
        </div>
      </div>
    `;
  }).join('');
}

function renderFallback() {
  const agents = Object.entries(AGENT_META).map(([id, meta]) => ({
    id,
    name: id.charAt(0).toUpperCase() + id.slice(1),
    status: 'standby',
    messages_sent: 0,
    last_active: null
  }));
  renderSummary(agents);
  renderAgents(agents);
}

async function fetchAndRender() {
  const banner = document.getElementById('error-banner');
  try {
    const resp = await fetch(STATS_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    const agents = data.agents || data;
    const agentList = Array.isArray(agents) ? agents : Object.entries(agents).map(([id, info]) => ({
      id,
      ...info
    }));

    // Ensure all 12 agents are present
    for (const [id, meta] of Object.entries(AGENT_META)) {
      if (!agentList.find(a => a.id === id)) {
        agentList.push({
          id,
          name: id.charAt(0).toUpperCase() + id.slice(1),
          status: 'offline',
          messages_sent: 0,
          last_active: null
        });
      }
    }

    renderSummary(agentList);
    renderAgents(agentList);
    banner.style.display = 'none';
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (err) {
    banner.textContent = 'Could not reach stats endpoint. Showing cached state. ' + err.message;
    banner.style.display = 'block';
    renderFallback();
    document.getElementById('last-updated').textContent = 'Offline mode';
  }
}

fetchAndRender();
setInterval(fetchAndRender, REFRESH_INTERVAL);
</script>
</body>
</html>
